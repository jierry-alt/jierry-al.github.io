<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=0">
  <title>♡｡Eternity.✨ - 个人专属导航页</title>
  <link rel="icon" type="image/png" href="https://img.icons8.com/lollipop/100/navigation.png" />
  <meta name="description" content="♡｡Eternity.✨ 的炫彩紫色个人导航页面" />
  <meta name="keywords" content="Eternity,导航,书签,炫彩,紫色,梦幻导航" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&family=Playfair+Display:wght@700&display=swap');

    :root {
      --purple: #c026d3;
      --light-purple: #e879f9;
      --deep-purple: #7e22ce;
      --cyan: #22d3ee;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #1e0533, #3b0764, #581c87, #6b21a8);
      font-family: 'Nunito', system-ui, sans-serif;
      color: #fff;
      overflow-x: hidden;
      position: relative;
    }

    /* 炫彩背景光效 */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 20%, rgba(192, 38, 211, 0.4), transparent 50%),
                  radial-gradient(circle at 70% 80%, rgba(34, 211, 238, 0.35), transparent 50%);
      pointer-events: none;
      z-index: -1;
      animation: bgPulse 15s ease infinite;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      text-align: center;
    }

    header {
      margin-bottom: 60px;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 3.8rem;
      font-weight: 700;
      background: linear-gradient(90deg, #c026d3, #e879f9, #a855f7, #22d3ee, #c026d3);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(192, 38, 211, 0.8),
                   0 0 60px rgba(34, 211, 238, 0.6);
      margin-bottom: 12px;
      animation: titleGlow 4s ease-in-out infinite alternate, rainbow 8s linear infinite;
    }

    .subtitle {
      font-size: 1.35rem;
      opacity: 0.9;
      letter-spacing: 2px;
      color: #e0abff;
    }

    .glass-card {
      background: rgba(30, 5, 51, 0.45);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(192, 38, 211, 0.4);
      border-radius: 28px;
      padding: 32px;
      margin: 25px auto;
      max-width: 920px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4),
                  0 0 30px rgba(192, 38, 211, 0.25);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-card:hover {
      transform: translateY(-12px) scale(1.02);
      border-color: #e879f9;
      box-shadow: 0 25px 50px rgba(192, 38, 211, 0.35),
                  0 0 50px rgba(34, 211, 238, 0.3);
    }

    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 35px;
    }

    .link-item {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(192, 38, 211, 0.5);
      border-radius: 20px;
      padding: 20px 26px;
      text-decoration: none;
      color: #fff;
      font-size: 1.15rem;
      font-weight: 600;
      transition: all 0.35s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }

    .link-item:hover {
      background: linear-gradient(135deg, rgba(192, 38, 211, 0.3), rgba(34, 211, 238, 0.25));
      transform: scale(1.08) translateY(-4px);
      border-color: #22d3ee;
      box-shadow: 0 0 30px rgba(192, 38, 211, 0.6);
    }

    .footer {
      margin-top: 90px;
      font-size: 1rem;
      opacity: 0.75;
      letter-spacing: 1px;
    }

    @keyframes titleGlow {
      from { text-shadow: 0 0 30px rgba(192, 38, 211, 0.7), 0 0 60px rgba(34, 211, 238, 0.4); }
      to { text-shadow: 0 0 50px rgba(192, 38, 211, 0.95), 0 0 80px rgba(34, 211, 238, 0.7); }
    }

    @keyframes rainbow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes bgPulse {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }

    /* 移动端优化 */
    @media (max-width: 768px) {
      .title { font-size: 2.9rem; }
      .glass-card { padding: 24px 18px; margin: 18px auto; }
      .links { gap: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 class="title">♡｡Eternity.✨</h1>
      <p class="subtitle">炫彩紫色 · 梦幻导航</p>
    </header>

    <div class="glass-card">
      <h2 style="margin-bottom: 28px; font-size: 1.65rem; color: #e879f9; text-shadow: 0 0 15px rgba(232, 121, 249, 0.6);">常用链接</h2>
      <div class="links">
        <a href="https://www.google.com" class="link-item" target="_blank">🔍 Google</a>
        <a href="https://github.com" class="link-item" target="_blank">🐙 GitHub</a>
        <a href="https://www.youtube.com" class="link-item" target="_blank">▶️ YouTube</a>
        <a href="https://x.com" class="link-item" target="_blank">𝕏 X (Twitter)</a>
        <a href="https://www.bilibili.com" class="link-item" target="_blank">📺 哔哩哔哩</a>
        <a href="https://chat.openai.com" class="link-item" target="_blank">🤖 ChatGPT</a>
        <!-- 在这里继续添加你常用的网站 -->
      </div>
    </div>

    <div class="footer">
      <p>© 2026 ♡｡Eternity.✨ — 炫彩紫色空间</p>
    </div>
  </div>
