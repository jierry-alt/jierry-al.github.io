    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&family=Playfair+Display:wght@700&display=swap');

    :root {
      --purple: #c026d3;
      --light-purple: #e879f9;
      --cyan: #22d3ee;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e0533, #3b0764, #581c87);
      font-family: 'Nunito', system-ui, sans-serif;
      color: #fff;
      overflow-x: hidden;
      padding-top: env(safe-area-inset-top);
      padding-bottom: 85px;
      position: relative;
    }

    .container {
      max-width: 100%;
      padding: 20px 16px 30px;
      text-align: center;
    }

    header { margin: 25px 0 30px; }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 2.55rem;
      font-weight: 700;
      background: linear-gradient(90deg, #c026d3, #e879f9, #22d3ee);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(192, 38, 211, 0.8);
      margin-bottom: 12px;
      animation: rainbow 10s linear infinite;
    }

    .subtitle {
      font-size: 1.12rem;
      opacity: 0.9;
      color: #e0abff;
      letter-spacing: 1px;
    }

    /* 炫彩跑马灯 */
    .marquee {
      margin: 18px 0 35px;
      overflow: hidden;
      white-space: nowrap;
      background: rgba(30, 5, 51, 0.6);
      border: 1px solid rgba(232, 121, 249, 0.4);
      border-radius: 50px;
      padding: 12px 0;
      box-shadow: 0 0 25px rgba(192, 38, 211, 0.5);
    }

    .marquee-content {
      display: inline-block;
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(90deg, #c026d3, #e879f9, #a855f7, #22d3ee, #c026d3);
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
      padding-left: 100%;
      animation: marquee 18s linear infinite;
    }

    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-100%); }
    }

    .glass-card {
      background: rgba(30, 5, 51, 0.55);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(192, 38, 211, 0.45);
      border-radius: 24px;
      padding: 26px 18px;
      margin: 18px 0;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .section-title {
      font-size: 1.4rem;
      color: #e879f9;
      margin-bottom: 22px;
      text-shadow: 0 0 15px rgba(232, 121, 249, 0.5);
    }

    .links {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
